<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="assets/img/8_coin/coin_1.png" type="image/png" />
    <title>EL Pollo Loco</title>
  </head>
  <body>
    <header class="topbar">
      <a class="impressum-link" href="impressum.html">Impressum</a>
      <button id="muteButton" class="menu-button small">Sound: An</button>
    </header>

    <main class="content">
      <div class="canvas-wrapper">
        <canvas
          id="canvas"
          width="720"
          height="480"
          style="display: block"
        ></canvas>

        <div id="menuButtons" class="menu-buttons">
          <button id="startButton" class="menu-button">Start</button>
          <button id="optionsButton" class="menu-button">Optionen</button>
        </div>

        <div id="endScreen" class="end-screen hidden">
          <h2 id="endTitle">Game Over</h2>
          <div class="end-buttons">
            <button id="restartButton" class="menu-button">Neustart</button>
            <button id="homeButton" class="menu-button">Home</button>
          </div>
        </div>

        <div id="touchControls" class="touch-controls">
          <button data-key="ArrowLeft" class="touch-button">Links</button>
          <button data-key="ArrowRight" class="touch-button">Rechts</button>
          <button data-key="ArrowUp" class="touch-button">Sprung</button>
          <button data-key="KeyD" class="touch-button">Wurf</button>
        </div>
      </div>
    </main>

    <div id="optionsModal" class="modal hidden">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-card">
        <button id="closeModalButton" class="close-modal">x</button>
        <h3>Steuerung</h3>
        <p>Laufen: Pfeil links / rechts</p>
        <p>Springen: Pfeil hoch</p>
        <p>Wurf: Taste D</p>
      </div>
    </div>

    <div id="orientationOverlay" class="orientation-overlay hidden">
      <p>Turn your device to play.</p>
    </div>
  </body>
</html>
