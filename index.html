<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/img/8_coin/coin_1.png" type="image/png" />
    <title>EL Pollo Loco</title>
    <script src="js/models/drawable-object.class.js" defer></script>
    <script src="js/models/movable-object.class.js" defer></script>
    <script src="js/models/caracter.class.js" defer></script>
    <script src="js/models/chicken.class.js" defer></script>
    <script src="js/models/status-bar.class.js" defer></script>
    <script src="js/models/coin-status-bar.class.js" defer></script>
    <script src="js/models/bottle-status-bar.class.js" defer></script>
    <script src="js/models/endboss-status-bar.class.js" defer></script>
    <script src="js/models/game-over-screen.class.js" defer></script>
    <script src="js/models/win-screen.class.js" defer></script>
    <script src="js/models/start-screen.class.js" defer></script>
    <script src="js/models/world.class.js" defer></script>
    <script src="js/models/cloud.class.js" defer></script>
    <script src="js/models/backround-object.class.js" defer></script>
    <script src="js/models/kayboard-object.class.js" defer></script>
    <script src="js/models/level.class.js" defer></script>
    <script src="js/models/throwable-object.class.js" defer></script>
    <script src="js/models/bottle.class.js" defer></script>
    <script src="js/models/coin.class.js" defer></script>
    <script src="js/models/endboss.class.js" defer></script>
    <script src="levels/level1.js" defer></script>
    <script src="js/game.js" defer></script>
  </head>

  <body onload="init()">
      <h1>EL Pollo Loco</h1>

      <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="720" height="480"></canvas>
        <button id="fullscreenButton" class="fullscreen-button" onclick="toggleFullscreen()" title="Vollbild"></button>
        <button id="startButton" class="start-button" onclick="startGame()">Start Game</button>
        <button id="guideButton" class="guide-button" onclick="toggleGuide()">Anleitung</button>
        <div id="guideOverlay" class="guide-overlay" onclick="closeGuideOnOverlay(event)">
          <div id="guidePanel" class="guide-panel">
            <h2>Tasten</h2>
            <p>Pfeil links/rechts: Laufen</p>
            <p>Leertaste: Springen</p>
            <p>Taste D: Flasche werfen</p>
          </div>
        </div>
        <button id="restartButton" class="restart-button" onclick="restartGame()">Restart</button>
        <button id="homeButton" class="home-button" onclick="goHome()">Home</button>
      </div>

  </body>
</html>
